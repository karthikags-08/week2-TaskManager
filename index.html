<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Interactive Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body class="light-theme">
    <div class="app-card">
        <header>
            <h1>Task Manager</h1>
            <button id="theme-toggle" class="icon-btn">🌓</button>
        </header>

        <form id="task-form">
            <input type="text" id="task-input" placeholder="Add a new task..." maxlength="50">
            <button type="submit" id="add-btn">Add</button>
        </form>

        <div class="controls">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <button id="clear-completed" class="text-btn">Clear Completed</button>
        </div>

        <ul id="task-list" class="task-list"></ul>

        <footer class="stats-bar">
            <span>Total: <b id="total-count">0</b></span>
            <span>Active: <b id="active-count">0</b></span>
            <span>Done: <b id="completed-count">0</b></span>
        </footer>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
